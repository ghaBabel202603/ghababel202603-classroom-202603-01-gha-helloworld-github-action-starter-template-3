name: Autograding Tests
'on':
- push
- repository_dispatch
permissions:
  checks: write
  actions: read
  contents: read
jobs:
  run-autograding-tests:
    runs-on: ubuntu-latest
    if: github.actor != 'github-classroom[bot]'
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    - name: Hello World Text
      id: hello-world-text
      uses: classroom-resources/autograding-command-grader@v1
      with:
        test-name: Hello World Text
        setup-command: ''
        command: bash tests/run.sh
        timeout: 10
        max-score: 10
    - name: Autograding Reporter
      uses: classroom-resources/autograding-grading-reporter@v1
      env:
        HELLO-WORLD-TEXT_RESULTS: "${{steps.hello-world-text.outputs.result}}"
      with:
        runners: hello-world-text
